  <!-- Top Right: Chat Bubble -->
  <rect x="272" y="48" width="192" height="192" fill="#9B59B6"/>
  <circle cx="368" cy="128" r="40" fill="#FFFFFF"/>
  <circle cx="356" cy="120" r="6" fill="#9B59B6"/>
  <circle cx="368" cy="120" r="6" fill="#9B59B6"/>
